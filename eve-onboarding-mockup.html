<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EVE — Onboarding (interactive mockup)</title>
<style>
:root{
  --eve:#6D4AFF; --eve-deep:#4f30d9; --eve-soft:#efeaff; --eve-soft2:#f6f3ff;
  --slack-aubergine:#3F0E40; --slack-aubergine-2:#350d36; --slack-hover:#4a154b;
  --slack-active:#1164A3; --slack-active-bg:#1164A3;
  --ink:#1d1c1d; --ink-2:#454245; --muted:#616061; --muted-2:#868686;
  --line:#e8e8e8; --line-2:#dddddd; --bg:#ffffff; --bg-2:#f8f8f8;
  --green:#2eb67d; --green-deep:#157a51; --amber:#e8912d; --red:#e01e5a;
  --blue:#1264a3; --chip:#f2f2f2;
  --radius:10px; --shadow:0 4px 16px rgba(0,0,0,.10); --shadow-lg:0 18px 48px rgba(0,0,0,.22);
}
*{box-sizing:border-box}
html,body{height:100%}
body{
  margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Lato,Helvetica,Arial,sans-serif;
  color:var(--ink); background:#dcdcdc; -webkit-font-smoothing:antialiased;
  display:flex; flex-direction:column; height:100vh; overflow:hidden;
}

/* ---------- Top control bar ---------- */
.topbar{
  display:flex; align-items:center; gap:14px; padding:8px 16px;
  background:#1a1320; color:#fff; flex:0 0 auto; border-bottom:1px solid #000;
}
.brand{display:flex; align-items:center; gap:9px; font-weight:800; letter-spacing:.2px}
.brand .logo{
  width:26px;height:26px;border-radius:8px;background:linear-gradient(135deg,var(--eve),#9b7bff);
  display:grid;place-items:center;font-weight:900;color:#fff;font-size:14px;box-shadow:0 2px 8px rgba(109,74,255,.5)
}
.brand small{font-weight:500;opacity:.6;font-size:11px;margin-left:2px}
.topbar .spacer{flex:1}
.viewtoggle{display:flex;background:#2c2333;border-radius:8px;padding:3px;gap:2px}
.viewtoggle button{
  border:0;background:transparent;color:#cdbfe0;font-size:12px;font-weight:700;
  padding:6px 14px;border-radius:6px;cursor:pointer;display:flex;align-items:center;gap:6px
}
.viewtoggle button.on{background:var(--eve);color:#fff}
.progresswrap{display:flex;align-items:center;gap:10px;color:#cdbfe0;font-size:12px;font-weight:600}
.progressbar{width:140px;height:6px;border-radius:6px;background:#2c2333;overflow:hidden}
.progressbar i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--eve),#9b7bff);transition:width .4s ease}
.btn-ghost{border:1px solid #3d3346;background:transparent;color:#e9e2f2;font-size:12px;font-weight:700;padding:7px 12px;border-radius:8px;cursor:pointer}
.btn-ghost:hover{background:#2c2333}

/* ---------- App frame ---------- */
.frame{flex:1;display:flex;min-height:0;position:relative;background:#fff}

/* ===== SLACK VIEW ===== */
.slack{display:flex;flex:1;min-height:0}
.sidebar{
  width:230px;flex:0 0 230px;background:var(--slack-aubergine);color:#cfc3d0;
  display:flex;flex-direction:column;min-height:0
}
.ws-head{
  padding:12px 16px;border-bottom:1px solid rgba(255,255,255,.12);color:#fff;font-weight:800;font-size:15px;
  display:flex;align-items:center;justify-content:space-between
}
.ws-head .dot{width:9px;height:9px;border-radius:50%;background:var(--green);display:inline-block;margin-right:7px}
.side-scroll{overflow:auto;padding:10px 8px;flex:1}
.side-sec{font-size:12px;color:#b3a0b4;font-weight:700;padding:8px 10px 4px;text-transform:none}
.chan{display:flex;align-items:center;gap:8px;padding:6px 10px;border-radius:6px;font-size:14px;cursor:default;color:#cfc3d0}
.chan .hash{opacity:.7;font-weight:600}
.chan.active{background:var(--slack-active-bg);color:#fff;font-weight:700}
.chan.dm .av{width:18px;height:18px;border-radius:4px;display:grid;place-items:center;font-size:10px;font-weight:800;color:#fff}
.chan .badge{margin-left:auto;background:#cd2553;color:#fff;font-size:11px;font-weight:800;border-radius:9px;padding:1px 7px}

.channel{flex:1;display:flex;flex-direction:column;min-width:0;background:#fff}
.channel-head{
  height:58px;flex:0 0 58px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:10px;padding:0 18px
}
.channel-head .title{font-weight:900;font-size:16px;display:flex;align-items:center;gap:6px}
.channel-head .sub{color:var(--muted);font-size:13px;border-left:1px solid var(--line);padding-left:12px;margin-left:6px}
.channel-head .right{margin-left:auto;display:flex;align-items:center;gap:8px}
.pill{font-size:11px;font-weight:800;padding:4px 10px;border-radius:20px;background:var(--eve-soft);color:var(--eve-deep)}

.messages{flex:1;overflow:auto;padding:18px 0 28px}
.daydiv{display:flex;align-items:center;gap:12px;margin:6px 24px 14px;color:var(--muted);font-size:12px;font-weight:700}
.daydiv:before,.daydiv:after{content:"";height:1px;background:var(--line);flex:1}

.msg{display:flex;gap:12px;padding:8px 24px;position:relative}
.msg:hover{background:#f8f8f8}
.msg .avatar{width:38px;height:38px;border-radius:9px;flex:0 0 38px;display:grid;place-items:center;font-weight:900;color:#fff;font-size:15px}
.av-eve{background:linear-gradient(135deg,var(--eve),#9b7bff)}
.av-user{background:#1f7a5c}
.msg .body{min-width:0;flex:1}
.msg .name{font-weight:900;font-size:15px;margin-right:8px}
.msg .name .bot{background:#e1e1e1;color:#4a4a4a;font-size:10px;font-weight:800;border-radius:4px;padding:1px 5px;margin-left:4px;vertical-align:middle;text-transform:uppercase;letter-spacing:.4px}
.msg .ts{color:var(--muted-2);font-size:12px;font-weight:500}
.msg .text{font-size:15px;line-height:1.55;color:var(--ink);margin-top:2px}
.msg .text p{margin:0 0 8px}
.msg .text ul{margin:4px 0 8px;padding-left:20px}
.msg .text li{margin:3px 0}
.msg .text b,.msg .text strong{font-weight:800}
.msg .text code{background:#f3f0ff;color:var(--eve-deep);padding:1px 6px;border-radius:5px;font-size:13px;font-family:ui-monospace,Menlo,monospace}

/* Slack action buttons */
.actions{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}
.sbtn{
  border:1px solid var(--line-2);background:#fff;color:var(--ink);font-weight:800;font-size:13px;
  padding:9px 14px;border-radius:8px;cursor:pointer;transition:.12s;display:flex;align-items:center;gap:7px
}
.sbtn:hover{background:#f6f6f6;border-color:#c9c9c9}
.sbtn.primary{background:var(--green);border-color:var(--green);color:#fff}
.sbtn.primary:hover{background:var(--green-deep)}
.sbtn.eve{background:var(--eve);border-color:var(--eve);color:#fff}
.sbtn.eve:hover{background:var(--eve-deep)}
.sbtn.danger{color:var(--red);border-color:#f3c5d4}
.sbtn.danger:hover{background:#fdeef3}
.sbtn:disabled{opacity:.5;cursor:default}
.actions.locked .sbtn{pointer-events:none}
.sbtn.chosen{background:var(--eve-deep);border-color:var(--eve-deep);color:#fff}
.actions.locked .sbtn:not(.chosen){opacity:.4}

/* cards / attachments */
.attach{border-left:4px solid var(--eve);background:#fbfaff;border:1px solid #ece8fb;border-left-width:4px;border-radius:8px;padding:14px 16px;margin-top:10px;max-width:720px}
.attach h4{margin:0 0 4px;font-size:14px;font-weight:900;display:flex;align-items:center;gap:8px}
.attach .kv{display:flex;flex-wrap:wrap;gap:6px 22px;margin:8px 0 0;font-size:13px;color:var(--ink-2)}
.attach .kv span b{color:var(--muted);font-weight:700;margin-right:5px;font-size:12px;text-transform:uppercase;letter-spacing:.3px}
.chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.chip{background:var(--chip);border:1px solid var(--line);font-size:12px;font-weight:700;border-radius:20px;padding:4px 11px;color:var(--ink-2)}
.chip.eve{background:var(--eve-soft);border-color:#e0d7ff;color:var(--eve-deep)}
.chip.green{background:#e7f7ef;border-color:#c4ecd9;color:var(--green-deep)}
.chip.amber{background:#fdf2e3;border-color:#f6dcb4;color:#9a5b14}

/* prospect cards */
.prospect{border:1px solid var(--line);border-radius:12px;padding:14px;margin-top:10px;max-width:740px;background:#fff;box-shadow:0 1px 2px rgba(0,0,0,.04)}
.prospect.removed{opacity:.45;filter:grayscale(.4)}
.prospect .ph{display:flex;align-items:flex-start;gap:12px}
.prospect .pa{width:42px;height:42px;border-radius:50%;flex:0 0 42px;display:grid;place-items:center;font-weight:900;color:#fff;font-size:15px;background:#7a7a7a}
.prospect .pn{font-weight:900;font-size:15px}
.prospect .pt{color:var(--muted);font-size:13px}
.fit{margin-left:auto;text-align:right;flex:0 0 auto}
.fit .score{font-weight:900;font-size:18px;color:var(--green-deep)}
.fit .lbl{font-size:10px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.4px}
.prospect .reason{font-size:13px;color:var(--ink-2);line-height:1.5;margin-top:10px;background:#fafafa;border-radius:8px;padding:9px 11px}
.prospect .reason b{color:var(--eve-deep)}
.prospect .meta{display:flex;flex-wrap:wrap;gap:6px;margin-top:9px}
.prospect .contact{display:flex;flex-wrap:wrap;gap:14px;margin-top:10px;font-size:12.5px;color:var(--blue);font-weight:700}
.prospect .contact a{color:var(--blue);text-decoration:none}
.prospect .pact{display:flex;gap:7px;margin-top:11px}
.minib{border:1px solid var(--line-2);background:#fff;font-size:12px;font-weight:800;padding:6px 11px;border-radius:7px;cursor:pointer;color:var(--ink-2)}
.minib:hover{background:#f5f5f5}
.minib.danger{color:var(--red);border-color:#f3c5d4}
.enrichbox{margin-top:9px;border-top:1px dashed var(--line);padding-top:9px;display:none;font-size:12.5px}
.enrichbox.show{display:block}
.enrichbox .kv{display:grid;grid-template-columns:1fr 1fr;gap:4px 18px}
.enrichbox .kv span b{color:var(--muted);font-weight:700;text-transform:uppercase;font-size:11px;letter-spacing:.3px;margin-right:5px}

/* typing */
.typing{display:flex;gap:12px;padding:8px 24px}
.typing .avatar{width:38px;height:38px;border-radius:9px;flex:0 0 38px}
.typing .bubble{display:flex;align-items:center;gap:5px;background:#f0eefb;border-radius:14px;padding:12px 16px;align-self:center}
.typing .bubble i{width:7px;height:7px;border-radius:50%;background:#b3a6e6;animation:bounce 1.2s infinite}
.typing .bubble i:nth-child(2){animation-delay:.18s}.typing .bubble i:nth-child(3){animation-delay:.36s}
@keyframes bounce{0%,60%,100%{transform:translateY(0);opacity:.5}30%{transform:translateY(-5px);opacity:1}}

/* composer */
.composer{flex:0 0 auto;padding:0 24px 22px}
.composer .box{border:1px solid var(--line-2);border-radius:12px;padding:10px 12px;display:flex;align-items:center;gap:10px;color:var(--muted-2);box-shadow:0 1px 2px rgba(0,0,0,.04)}
.composer .box .plus{width:26px;height:26px;border-radius:6px;border:1px solid var(--line-2);display:grid;place-items:center;font-size:16px;color:var(--muted)}
.composer .send{margin-left:auto;width:30px;height:30px;border-radius:7px;background:#e8e8e8;display:grid;place-items:center;color:#fff;font-size:14px}

/* analyzing splash */
.analyzing{padding:8px 24px}
.analyzing .card{max-width:560px;border:1px solid var(--line);border-radius:14px;padding:18px;background:linear-gradient(180deg,#fbfaff,#fff)}
.analyzing .row{display:flex;align-items:center;gap:11px;font-size:14px;color:var(--ink-2);padding:7px 0}
.analyzing .row .ic{width:22px;height:22px;border-radius:50%;border:2px solid #e0d7ff;border-top-color:var(--eve);animation:spin 1s linear infinite;flex:0 0 22px}
.analyzing .row.done .ic{border:0;background:var(--green);color:#fff;display:grid;place-items:center;font-size:13px;animation:none}
.analyzing .row.pending{opacity:.45}
.analyzing .row.pending .ic{border-color:#e8e8e8;border-top-color:#e8e8e8;animation:none}
@keyframes spin{to{transform:rotate(360deg)}}

/* ===== WEB APP VIEW ===== */
.webapp{position:absolute;inset:0;display:none;background:#f4f5f9}
.webapp.show{display:flex}
.wa-side{width:230px;flex:0 0 230px;background:#fff;border-right:1px solid var(--line);padding:18px 14px;display:flex;flex-direction:column}
.wa-brand{display:flex;align-items:center;gap:9px;font-weight:900;font-size:17px;padding:4px 8px 18px}
.wa-brand .logo{width:30px;height:30px;border-radius:9px;background:linear-gradient(135deg,var(--eve),#9b7bff);display:grid;place-items:center;color:#fff;font-weight:900}
.wa-nav a{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:9px;color:var(--ink-2);font-weight:700;font-size:14px;text-decoration:none;margin-bottom:2px}
.wa-nav a .gi{width:18px;text-align:center;opacity:.7}
.wa-nav a.active{background:var(--eve-soft);color:var(--eve-deep)}
.wa-main{flex:1;overflow:auto;padding:30px 40px}
.wa-bc{font-size:13px;color:var(--muted);font-weight:700;margin-bottom:6px}
.wa-h1{font-size:24px;font-weight:900;margin:0 0 4px}
.wa-sub{color:var(--muted);font-size:14px;margin:0 0 24px}
.wa-card{background:#fff;border:1px solid var(--line);border-radius:14px;padding:20px;margin-bottom:18px;max-width:680px}
.wa-card h3{margin:0 0 3px;font-size:16px;font-weight:900;display:flex;align-items:center;gap:9px}
.wa-card .desc{color:var(--muted);font-size:13.5px;margin:0 0 14px;line-height:1.5}
.integ-row{display:flex;align-items:center;gap:14px;padding:14px;border:1px solid var(--line);border-radius:11px;margin-top:10px}
.integ-row .ilogo{width:42px;height:42px;border-radius:10px;display:grid;place-items:center;font-weight:900;color:#fff;font-size:16px;flex:0 0 42px}
.integ-row .iname{font-weight:800;font-size:14.5px}
.integ-row .istat{font-size:12.5px;color:var(--muted)}
.integ-row .iact{margin-left:auto}
.status-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:6px}
.status-dot.on{background:var(--green)}.status-dot.off{background:#c7c7c7}
.wbtn{border:1px solid var(--eve);background:var(--eve);color:#fff;font-weight:800;font-size:13px;padding:9px 16px;border-radius:9px;cursor:pointer}
.wbtn:hover{background:var(--eve-deep)}
.wbtn.ghost{background:#fff;color:var(--ink-2);border-color:var(--line-2)}
.wbtn.ghost:hover{background:#f6f6f6}
.wbtn.green{background:var(--green);border-color:var(--green)}
.wbtn.green:hover{background:var(--green-deep)}
.wbtn:disabled{opacity:.5;cursor:default}

/* popup */
.overlay{position:absolute;inset:0;background:rgba(20,12,30,.45);display:none;align-items:center;justify-content:center;z-index:40;padding:20px}
.overlay.show{display:flex}
.popup{background:#fff;border-radius:18px;box-shadow:var(--shadow-lg);width:430px;max-width:100%;padding:26px;animation:pop .25s ease}
@keyframes pop{from{transform:translateY(12px) scale(.97);opacity:0}to{transform:none;opacity:1}}
.popup .ph{display:flex;align-items:center;gap:11px;margin-bottom:6px}
.popup .ph .lg{width:38px;height:38px;border-radius:10px;display:grid;place-items:center;color:#fff;font-weight:900}
.popup h3{margin:0;font-size:18px;font-weight:900}
.popup .psub{color:var(--muted);font-size:13px;margin:2px 0 18px}
.field{margin-bottom:13px}
.field label{display:block;font-size:12.5px;font-weight:800;color:var(--ink-2);margin-bottom:5px}
.field input{width:100%;border:1px solid var(--line-2);border-radius:9px;padding:11px 12px;font-size:14px;outline:none}
.field input:focus{border-color:var(--eve);box-shadow:0 0 0 3px var(--eve-soft)}
.popup .row{display:flex;gap:10px;margin-top:6px}
.popup .row .wbtn{flex:1;text-align:center}
.choice{display:flex;gap:12px;margin:6px 0 4px}
.choice .opt{flex:1;border:1.5px solid var(--line-2);border-radius:12px;padding:16px 12px;text-align:center;cursor:pointer;font-weight:800;font-size:13.5px;transition:.12s;display:flex;flex-direction:column;align-items:center;gap:9px}
.choice .opt:hover{border-color:var(--eve);background:var(--eve-soft2)}
.choice .opt .g{width:34px;height:34px;border-radius:9px;display:grid;place-items:center;color:#fff;font-weight:900;font-size:15px}
.popup .loadwrap{text-align:center;padding:18px 0}
.popup .spinner{width:46px;height:46px;border-radius:50%;border:4px solid var(--eve-soft);border-top-color:var(--eve);margin:0 auto 16px;animation:spin 1s linear infinite}
.popup .ok{width:64px;height:64px;border-radius:50%;background:var(--green);display:grid;place-items:center;color:#fff;font-size:32px;margin:6px auto 14px}
.errline{background:#fdeef3;border:1px solid #f3c5d4;color:#b3194a;font-size:12.5px;font-weight:700;border-radius:8px;padding:9px 11px;margin-bottom:12px;display:none}
.errline.show{display:block}
.profilechip{display:flex;align-items:center;gap:11px;justify-content:center;margin-bottom:6px}
.profilechip .pp{width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,#0a66c2,#378fe9);display:grid;place-items:center;color:#fff;font-weight:900;font-size:18px}

/* safety limits */
.limit-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin:14px 0}
.limit-box{border:1px solid var(--line);border-radius:11px;padding:13px;text-align:center;background:#fafafa}
.limit-box .v{font-size:24px;font-weight:900;color:var(--eve-deep)}
.limit-box .l{font-size:11.5px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.3px;margin-top:3px}
.limit-box input{width:70px;text-align:center;font-size:20px;font-weight:900;color:var(--eve-deep);border:1px solid var(--line-2);border-radius:7px;padding:3px}
.adv-toggle{font-size:13px;font-weight:800;color:var(--eve);cursor:pointer;display:inline-flex;align-items:center;gap:6px}
.warnline{background:#fdf2e3;border:1px solid #f6dcb4;color:#9a5b14;font-size:12.5px;font-weight:700;border-radius:8px;padding:9px 11px;margin-top:10px;display:none}
.warnline.show{display:block}
.sub-badge{font-size:12px;font-weight:800;color:#0a66c2;background:#e7f0fb;border:1px solid #c9e0f7;border-radius:20px;padding:3px 11px;display:inline-block}

.toast{position:absolute;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:#1a1320;color:#fff;font-weight:700;font-size:13px;padding:11px 18px;border-radius:11px;box-shadow:var(--shadow-lg);opacity:0;transition:.3s;z-index:60;display:flex;align-items:center;gap:9px;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* complete card */
.complete{border:2px solid var(--green);background:#f3fbf7;border-radius:14px;padding:18px;margin-top:10px;max-width:720px}
.complete h4{margin:0 0 10px;font-size:16px;color:var(--green-deep);display:flex;align-items:center;gap:9px}
.complete ul{list-style:none;margin:0;padding:0}
.complete li{display:flex;align-items:center;gap:10px;padding:5px 0;font-size:14px;color:var(--ink-2)}
.complete li .ck{width:20px;height:20px;border-radius:50%;background:var(--green);color:#fff;display:grid;place-items:center;font-size:12px;flex:0 0 20px}

@media (max-width:760px){.sidebar,.wa-side{display:none}.progresswrap{display:none}}
</style>
</head>
<body>

<div class="topbar">
  <div class="brand"><span class="logo">E</span> EVE <small>onboarding mockup</small></div>
  <div class="spacer"></div>
  <div class="progresswrap">
    <span id="stepLabel">Step 1 / 12</span>
    <div class="progressbar"><i id="progFill"></i></div>
  </div>
  <div class="viewtoggle">
    <button id="vSlack" class="on" onclick="setView('slack')">▦ Slack</button>
    <button id="vWeb" onclick="setView('web')">🖥 Web app</button>
  </div>
  <button class="btn-ghost" onclick="restart()">↻ Restart</button>
</div>

<div class="frame">
  <!-- ===================== SLACK VIEW ===================== -->
  <div class="slack" id="slackView">
    <aside class="sidebar">
      <div class="ws-head"><span><span class="dot"></span>EVE · joineve.ai</span><span style="opacity:.5">⌄</span></div>
      <div class="side-scroll">
        <div class="side-sec">Channels</div>
        <div class="chan"><span class="hash">#</span> general</div>
        <div class="chan"><span class="hash">#</span> sales</div>
        <div class="side-sec">Apps &amp; DMs</div>
        <div class="chan dm active"><span class="av" style="background:linear-gradient(135deg,var(--eve),#9b7bff)">E</span> EVE <span class="badge" id="dmBadge">1</span></div>
        <div class="chan dm"><span class="av" style="background:#1f7a5c">O</span> Olesia (you)</div>
      </div>
    </aside>

    <main class="channel">
      <div class="channel-head">

function toast(txt){
  const t=document.getElementById('toast'); t.innerHTML='✦ '+txt; t.classList.add('show');

/* ---------- message rendering ---------- */
function scrollDown(){ requestAnimationFrame(()=>{ messagesEl.scrollTop = messagesEl.scrollHeight; }); }
function now(){ const d=new Date(); let h=d.getHours(),m=d.getMinutes(); const ap=h>=12?'PM':'AM'; h=h%12||12; return h+':'+String(m).padStart(2,'0')+' '+ap; }

function eveMsg(html){

}

function systemNote(html){

/* typing then callback */
function typing(ms,cb){

   ============================================================ */

function runAnalysis(){
  const a = document.createElement('div'); a.className='analyzing';

      rows.forEach(r=>{ r.classList.add('done'); r.querySelector('.ic').innerHTML='✓'; });

  const g=document.getElementById('a-connect'); if(g) g.classList.add('locked');
  setView('slack');
  userMsg('Skip channel setup for now.');
  typing(900,()=> step10('<p>No problem — you can connect your channels anytime from <b>Integrations</b>. I\'ll get everything else ready and hold off on sending until they\'re connected.</p>'));
}
function maybeAfterConnect(){
  // when all required channels connected, continue
  const okEmail = !state._needEmail || state.inboxDone;
  const okLI = !state._needLI || (state.liDone && state.limitsDone);
  if(okEmail && okLI){
    const g=document.getElementById('a-connect'); if(g) g.classList.add('locked');
    setView('slack');
    let txt = 'All set';
    if(state._needLI) txt='LinkedIn is connected and your <b>safety limits</b> are configured';
    if(state._needEmail && state._needLI) txt='Your inbox and LinkedIn are connected, and <b>safety limits</b> are configured';
    else if(state._needEmail) txt='Your inbox is connected';
    typing(900,()=> step10('<p>✅ '+txt+'.</p>'));
  } else {
    setView('slack');
    // mark done buttons
    if(state.inboxDone){ const b=document.getElementById('btnInbox'); if(b){b.classList.add('chosen');b.innerHTML='✓ Inbox connected';} }
    if(state.liDone){ const b=document.getElementById('btnLI'); if(b){b.classList.add('chosen');b.innerHTML='✓ LinkedIn connected';} }
    typing(700,()=>{ eveMsg('Nice — one channel done. Connect the other when you\'re ready 👆'); });
  }
}

/* ---------- LinkedIn safety limits ---------- */
const REC_LIMITS={conn:120,msg:150,visit:250};
function openLimits(autoOpenedAfterConnect){
  setView('web');
  const navInteg=document.getElementById('navInteg');
  const m=document.getElementById('waMain');
  m.innerHTML=`
    <div class="wa-bc">Integrations › LinkedIn</div>
    <h1 class="wa-h1">LinkedIn settings</h1>
    <p class="wa-sub">Connected as <b>Olesia Petrova</b>.</p>
    <div class="wa-card">
      <h3>🛡️ LinkedIn Safety Limits</h3>
      <p class="desc">We've automatically configured safe outreach limits for your account. These reduce the risk of restrictions while maximizing performance — you don't need to change anything.</p>
      <div style="margin:4px 0 12px"><span class="sub-badge">Detected subscription: Sales Navigator</span></div>
      <div class="limit-grid" id="limitGrid">
        <div class="limit-box"><div class="v" id="vConn">${REC_LIMITS.conn}</div><div class="l">Connection requests / wk</div></div>
        <div class="limit-box"><div class="v" id="vMsg">${REC_LIMITS.msg}</div><div class="l">Messages / wk</div></div>
        <div class="limit-box"><div class="v" id="vVisit">${REC_LIMITS.visit}</div><div class="l">Profile visits / wk</div></div>
      </div>
      <div class="adv-toggle" onclick="toggleAdv()"><span id="advCaret">▸</span> Advanced — edit limits manually</div>
      <div id="advPanel" style="display:none">
        <div class="limit-grid">
          <div class="limit-box"><input id="iConn" type="number" value="${REC_LIMITS.conn}" oninput="checkLimits()"><div class="l">Connection requests / wk</div></div>
          <div class="limit-box"><input id="iMsg" type="number" value="${REC_LIMITS.msg}" oninput="checkLimits()"><div class="l">Messages / wk</div></div>
          <div class="limit-box"><input id="iVisit" type="number" value="${REC_LIMITS.visit}" oninput="checkLimits()"><div class="l">Profile visits / wk</div></div>
        </div>
        <div class="warnline" id="limitWarn">⚠️ These limits may increase the risk of LinkedIn account restrictions.</div>
        <button class="wbtn ghost" onclick="restoreLimits()" style="margin-top:6px">↺ Restore EVE recommendations</button>
      </div>
      <div class="row" style="margin-top:18px"><button class="wbtn green" onclick="saveLimits()">Accept &amp; save limits</button></div>
    </div>`;
}
function toggleAdv(){ const p=document.getElementById('advPanel'); const open=p.style.display==='none'; p.style.display=open?'block':'none'; document.getElementById('advCaret').textContent=open?'▾':'▸'; }
function checkLimits(){
  const c=+document.getElementById('iConn').value, mm=+document.getElementById('iMsg').value, v=+document.getElementById('iVisit').value;
  const unsafe = c>REC_LIMITS.conn || mm>REC_LIMITS.msg || v>REC_LIMITS.visit;
  document.getElementById('limitWarn').classList.toggle('show',unsafe);
  document.getElementById('vConn').textContent=c; document.getElementById('vMsg').textContent=mm; document.getElementById('vVisit').textContent=v;
}
function restoreLimits(){ document.getElementById('iConn').value=REC_LIMITS.conn; document.getElementById('iMsg').value=REC_LIMITS.msg; document.getElementById('iVisit').value=REC_LIMITS.visit; checkLimits(); toast('Restored EVE recommendations.'); }
function saveLimits(){
  state.limitsDone=true; toast('LinkedIn safety limits configured successfully ✅');
  renderIntegrations(); maybeAfterConnect();
}

}
function chLabel(){ return {linkedin:'LinkedIn',email:'Email',both:'LinkedIn + Email'}[state.channel]||'LinkedIn'; }
function pickCampaign(name,b){
  state.campaign=name;

  document.querySelectorAll('#messages .attach .actions').forEach(g=>g.classList.add('locked'));

function afterCampaign(){ if(!state.crmProposed) crmLateProposal(); else step12(); }

  lock(document.getElementById('a-crm-late'),b); state.crmProposed=true;

/* ============================================================
   STEP 12 — Copilot vs Autopilot
   ============================================================ */
function step12(lead){
  setStep(11);
  eveMsg(`${lead||''}<p>Last decision — how should I run <b>${state.campaign}</b>?</p>
    <div class="attach"><h4>🤖 Autopilot <span class="chip eve" style="margin-left:4px">Recommended</span></h4>
      <div style="font-size:13px;color:var(--ink-2);margin-top:6px">I run the campaign end-to-end — find prospects, write outreach, send connections &amp; follow-ups, monitor replies, book meetings. You get <b>daily summaries</b>, replies that need you, booked meetings and analytics. No step-by-step approvals.</div>
    </div>
    <div class="attach"><h4>🧑‍✈️ Copilot</h4>
      <div style="font-size:13px;color:var(--ink-2);margin-top:6px">I prepare each step but ask you to review &amp; approve the <b>strategy, prospect list, messages and launch</b>. More control, a bit more of your time.</div>
    </div>
    <p style="margin-top:10px">You can switch modes anytime.</p>
    <div class="actions" id="a-mode">
      <button class="sbtn eve" onclick="pickMode('autopilot',this)">🤖 Run on Autopilot</button>
      <button class="sbtn" onclick="pickMode('copilot',this)">🧑‍✈️ Use Copilot</button>
    </div>`);
}
function pickMode(m,b){
  state.mode=m; lock(document.getElementById('a-mode'),b);
  const pill=document.getElementById('modePill'); pill.style.display='inline-block';
  pill.textContent=(m==='autopilot'?'⚡ Autopilot':'🧑‍✈️ Copilot')+' mode';
  userMsg(m==='autopilot'?'Run it on Autopilot 🤖':'Use Copilot — I want to review key steps.');
  const ack = m==='autopilot'
    ? '<p>Perfect. I\'ll run <b>'+state.campaign+'</b> on autopilot — finding prospects, preparing outreach, sending and following up, and booking meetings. You\'ll get a daily report right here. Let\'s go! 🚀</p>'
    : '<p>Got it — <b>Copilot</b> it is. Before launch I\'ll ask you to confirm the prospect list, campaign plan and message examples. I\'ll handle the work and send daily reports.</p>';
  typing(1100,()=> complete(ack));
}

     <ul>${items.map(t=>`<li><span class="ck">✓</span> ${t}</li>`).join('')}</ul></div>
