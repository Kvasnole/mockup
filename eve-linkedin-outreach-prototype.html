<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EVE — LinkedIn Outreach Campaign Prototype (Copilot vs Autopilot)</title>
<style>
  :root{
    --eve1:#6d5efc; --eve2:#a855f7; --eve-ink:#1d1b2e;
    --slack-aubergine:#3f0e40; --slack-aubergine2:#350d36;
    --slack-green:#007a5a; --slack-blue:#1264a3;
    --bg:#eef0f4; --panel:#ffffff; --line:#e4e6ec; --line2:#eceef3;
    --ink:#1d2433; --muted:#6b7280; --muted2:#8a91a0;
    --ok:#1a7f53; --okbg:#e7f6ee; --warn:#b45309; --warnbg:#fdf2e3;
    --chip:#f1f0fe; --shadow:0 10px 30px rgba(20,20,50,.10);
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--ink);}
  .app{display:flex;height:100vh;overflow:hidden}

  /* ---------- Left index ---------- */
  .index{width:330px;flex:0 0 330px;background:#fff;color:#1d2433;height:100vh;display:flex;flex-direction:column;border-right:1px solid var(--line)}
  .brand{display:flex;align-items:center;gap:10px;padding:18px 20px 10px;flex:0 0 auto}
  .logo{width:30px;height:30px;border-radius:9px;background:linear-gradient(135deg,var(--eve1),var(--eve2));display:flex;align-items:center;justify-content:center;font-weight:800;color:#fff;font-size:16px;box-shadow:0 4px 12px rgba(109,94,252,.35)}
  .brand b{font-size:15px;color:var(--ink);letter-spacing:.2px}
  .brand small{display:block;color:var(--muted);font-size:11px;font-weight:500}
  .idx-note{font-size:11px;color:var(--muted);padding:0 20px 12px;line-height:1.5;flex:0 0 auto}
  .journey-h{font-size:11px;text-transform:uppercase;letter-spacing:.14em;color:#8a91a0;font-weight:800;padding:13px 20px 2px;flex:0 0 auto;border-top:1px solid var(--line2)}
  .nav{flex:1 1 auto;overflow-y:auto;min-height:0;padding:6px 0 26px}
  .phase{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:#aab0bd;padding:15px 20px 4px;font-weight:800}
  .nav a{display:flex;gap:12px;align-items:center;padding:9px 12px;margin:1px 10px;border-radius:10px;font-size:14px;color:#3a4151;cursor:pointer;font-weight:500;line-height:1.3}
  .nav a .num{width:27px;height:27px;border-radius:50%;border:1.5px solid #dde0e8;color:#828a99;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex:0 0 27px;font-variant-numeric:tabular-nums}
  .nav a .lbl{flex:1 1 auto}
  .nav a:hover{background:#f5f5fb}
  .nav a.active{background:#ece9fe;color:#4a3bd0;font-weight:700}
  .nav a.active .num{background:var(--eve1);border-color:var(--eve1);color:#fff}
  .li-badge{flex:0 0 auto;width:19px;height:19px;border-radius:4px;background:#0a66c2;color:#fff;font-size:10px;font-weight:800;display:flex;align-items:center;justify-content:center;font-family:Georgia,'Times New Roman',serif}

  /* ---------- Stage ---------- */
  .stage{flex:1;display:flex;flex-direction:column;height:100vh;overflow:hidden}
  .topbar{display:flex;align-items:center;gap:14px;padding:12px 22px;background:#fff;border-bottom:1px solid var(--line)}
  .topbar h1{font-size:14.5px;margin:0;font-weight:700}
  .topbar .sub{font-size:12px;color:var(--muted)}
  .surface-pill{margin-left:auto;display:flex;gap:6px;background:#f1f2f6;padding:4px;border-radius:10px}
  .surface-pill span{font-size:11px;padding:4px 12px;border-radius:7px;color:var(--muted);font-weight:600}
  .surface-pill span.on{background:#fff;color:var(--ink);box-shadow:0 1px 3px rgba(0,0,0,.12)}
  .navbtns{display:flex;gap:8px;margin-left:14px}
  .navbtns button{border:1px solid var(--line);background:#fff;border-radius:8px;padding:6px 12px;font-size:12px;cursor:pointer;color:var(--ink);font-weight:600}
  .navbtns button:hover{background:#f6f6fb}
  .navbtns button:disabled{opacity:.4;cursor:default}

  .canvas{flex:1;overflow-y:auto;padding:30px;display:flex;justify-content:center}
  .screen-wrap{width:100%;max-width:940px}
  .screen-caption{font-size:12.5px;color:var(--muted);margin:0 4px 16px;line-height:1.5}
  .screen-caption b{color:var(--ink)}

  /* ---------- Slack frame ---------- */
  .slack{display:flex;border-radius:14px;overflow:hidden;box-shadow:var(--shadow);border:1px solid var(--line);background:#fff;min-height:560px}
  .slack-rail{width:64px;background:#2d0a2e;flex:0 0 64px;display:flex;flex-direction:column;align-items:center;padding-top:14px;gap:14px}
  .slack-rail .ws{width:40px;height:40px;border-radius:13px;background:linear-gradient(135deg,var(--eve1),var(--eve2));color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:15px}
  .slack-rail .ic{width:36px;height:36px;border-radius:50%;background:#511452;display:flex;align-items:center;justify-content:center;color:#d9a9da;font-size:16px}
  .slack-side{width:210px;flex:0 0 210px;background:var(--slack-aubergine);color:#cfa9cf;padding:0}
  .slack-side .wsname{color:#fff;font-weight:800;font-size:14px;padding:14px 16px;border-bottom:1px solid rgba(255,255,255,.08);display:flex;align-items:center;gap:6px}
  .slack-side .grp{font-size:11.5px;color:#bd9bbd;padding:12px 16px 4px;font-weight:600}
  .slack-side .ch{font-size:13.5px;padding:5px 16px;color:#d8bcd8;display:flex;align-items:center;gap:8px}
  .slack-side .ch.active{background:#1164a3;color:#fff;font-weight:600}
  .slack-side .ch .dot{width:16px;text-align:center;opacity:.8}
  .slack-side .ch .av{width:16px;height:16px;border-radius:4px;background:linear-gradient(135deg,var(--eve1),var(--eve2));font-size:9px;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800}
  .slack-side .badge{margin-left:auto;background:#cd2553;color:#fff;font-size:10px;border-radius:9px;padding:0 6px;font-weight:700}
  .slack-main{flex:1;display:flex;flex-direction:column;background:#fff;min-width:0}
  .slack-head{padding:12px 18px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:8px}
  .slack-head .av{width:24px;height:24px;border-radius:6px;background:linear-gradient(135deg,var(--eve1),var(--eve2));color:#fff;font-size:11px;display:flex;align-items:center;justify-content:center;font-weight:800}
  .slack-head b{font-size:14.5px}
  .slack-head .pres{font-size:11px;color:var(--muted);margin-left:2px}
  .slack-body{flex:1;padding:18px;overflow-y:auto}
  .slack-compose{margin:0 16px 16px;border:1px solid #d7dae0;border-radius:9px;padding:10px 12px;color:#9aa0ab;font-size:13px;display:flex;align-items:center;gap:8px}

  .msg{display:flex;gap:11px;margin-bottom:18px}
  .msg .av{width:36px;height:36px;border-radius:8px;flex:0 0 36px;display:flex;align-items:center;justify-content:center;font-weight:800;color:#fff;font-size:14px}
  .av.eve{background:linear-gradient(135deg,var(--eve1),var(--eve2))}
  .av.user{background:#0b8043}
  .msg .who{font-weight:800;font-size:13.5px}
  .msg .who .bot{background:#e8e6fb;color:#5b4bd6;font-size:9px;font-weight:700;border-radius:3px;padding:1px 4px;margin-left:5px;vertical-align:middle}
  .msg .when{color:var(--muted2);font-size:11px;margin-left:6px;font-weight:500}
  .msg .text{font-size:13.6px;line-height:1.55;color:#1d1c1d;margin-top:2px}
  .msg .text p{margin:0 0 8px}

  /* Slack block-kit-ish card */
  .skcard{border:1px solid #e1e3e8;border-left:4px solid var(--eve1);border-radius:8px;padding:14px 16px;margin-top:8px;background:#fff;max-width:560px}
  .skcard h4{margin:0 0 4px;font-size:14.5px}
  .skcard .kv{font-size:13px;margin:7px 0;line-height:1.5}
  .skcard .kv b{color:#3a3a45}
  .skfields{display:grid;grid-template-columns:1fr 1fr;gap:8px 18px;margin:10px 0}
  .skfields div{font-size:12.7px}
  .skfields .lbl{color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.04em;margin-bottom:1px}
  .seq{margin:10px 0;border-top:1px solid var(--line2);padding-top:10px}
  .seq .step{display:flex;gap:10px;font-size:12.7px;margin:6px 0;align-items:flex-start}
  .seq .step .num{flex:0 0 22px;height:22px;border-radius:50%;background:var(--chip);color:#5b4bd6;font-weight:700;font-size:11px;display:flex;align-items:center;justify-content:center}
  .seq .step .d{font-size:11px;color:var(--muted);margin-left:auto;white-space:nowrap}

  .btnrow{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
  .sbtn{border:1px solid #c9cdd4;background:#fff;border-radius:7px;padding:8px 14px;font-size:13px;font-weight:700;cursor:pointer;color:#1d1c1d}
  .sbtn:hover{background:#f6f6f8}
  .sbtn.green{background:var(--slack-green);border-color:var(--slack-green);color:#fff}
  .sbtn.green:hover{background:#066c50}
  .sbtn.primary{background:var(--eve1);border-color:var(--eve1);color:#fff}
  .sbtn.primary:hover{background:#5a4bf0}
  .sbtn.link{border:none;background:none;color:var(--slack-blue);padding:8px 4px}
  .inputline{display:flex;gap:8px;margin-top:10px;max-width:560px}
  .inputline input{flex:1;border:1px solid #c9cdd4;border-radius:7px;padding:9px 12px;font-size:13px}

  .quote{border-left:3px solid #d7dae0;padding:2px 0 2px 12px;margin:6px 0;color:#3a3a45;font-size:13px;line-height:1.5}
  .chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
  .chip{background:var(--chip);color:#5b4bd6;font-size:11.5px;padding:3px 9px;border-radius:20px;font-weight:600}
  .chip.gray{background:#f1f2f5;color:#5a6172}

  /* message preview bubble */
  .mprev{border:1px solid #e1e3e8;border-radius:8px;margin-top:8px;overflow:hidden;max-width:560px}
  .mprev .h{background:#f7f7fb;padding:7px 12px;font-size:11px;font-weight:700;color:#5b4bd6;text-transform:uppercase;letter-spacing:.04em;border-bottom:1px solid #ececf3}
  .mprev .b{padding:11px 12px;font-size:13px;line-height:1.55;white-space:pre-line;color:#23222a}
  .mprev .b .ev{background:#fff7e6;border-bottom:1px dashed #e3b341}

  /* ---------- Web app frame ---------- */
  .browser{border-radius:14px;overflow:hidden;box-shadow:var(--shadow);border:1px solid var(--line);background:#fff}
  .chrome{background:#e9eaee;padding:9px 14px;display:flex;align-items:center;gap:8px;border-bottom:1px solid #dcdde2}
  .chrome .dots{display:flex;gap:6px}
  .chrome .dots i{width:11px;height:11px;border-radius:50%;display:block}
  .chrome .dots i:nth-child(1){background:#ff5f57}.chrome .dots i:nth-child(2){background:#febc2e}.chrome .dots i:nth-child(3){background:#28c840}
  .chrome .url{flex:1;background:#fff;border-radius:7px;padding:5px 12px;font-size:12px;color:#5b6270;border:1px solid #dcdde2;max-width:520px;margin:0 auto}
  .chrome .url b{color:var(--ink)}
  .web{display:flex;min-height:560px}
  .web-side{width:210px;flex:0 0 210px;background:#fbfbfd;border-right:1px solid var(--line);padding:14px 0}
  .web-side .b{display:flex;align-items:center;gap:9px;padding:0 16px 14px;font-weight:800;font-size:14px}
  .web-side .b .logo{width:26px;height:26px;font-size:14px;border-radius:8px}
  .web-side a{display:flex;align-items:center;gap:10px;font-size:13px;color:#525a6a;padding:8px 16px;cursor:pointer;font-weight:500}
  .web-side a .i{width:16px;text-align:center;opacity:.7}
  .web-side a.active{background:#f0effe;color:#5b4bd6;font-weight:700;box-shadow:inset 3px 0 var(--eve1)}
  .web-side a:hover{background:#f3f3f8}
  .web-main{flex:1;padding:24px 28px;overflow-y:auto;min-width:0;background:#fff;position:relative}
  .web-h{display:flex;align-items:flex-start;gap:12px;margin-bottom:18px}
  .web-h h2{margin:0;font-size:20px}
  .web-h .desc{font-size:13px;color:var(--muted);margin-top:3px}
  .web-h .right{margin-left:auto;display:flex;gap:8px}
  .wbtn{border:1px solid #d4d7e0;background:#fff;border-radius:8px;padding:8px 15px;font-size:13px;font-weight:600;cursor:pointer;color:var(--ink)}
  .wbtn:hover{background:#f7f7fb}
  .wbtn.primary{background:var(--eve1);border-color:var(--eve1);color:#fff}
  .wbtn.primary:hover{background:#5a4bf0}
  .wbtn.danger{color:#b42318;border-color:#f1c6c1}
  .wbtn.danger:hover{background:#fdf1f0}
  .wbtn.ghost{border-color:transparent;color:var(--muted)}

  .card{border:1px solid var(--line);border-radius:12px;padding:16px 18px;margin-bottom:14px;background:#fff}
  .card h3{margin:0 0 10px;font-size:15px}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
  .grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}

  .stat{border:1px solid var(--line);border-radius:11px;padding:13px 15px;background:#fff}
  .stat .lab{font-size:11.5px;color:var(--muted);font-weight:600}
  .stat .val{font-size:24px;font-weight:800;margin-top:4px;letter-spacing:-.5px}
  .stat .sub{font-size:11px;color:var(--muted2);margin-top:2px}
  .stat.good .val{color:var(--ok)} .stat.warn .val{color:var(--warn)}

  .prospect{display:flex;gap:13px;border:1px solid var(--line);border-radius:11px;padding:13px 15px;margin-bottom:11px;align-items:flex-start}
  .prospect .pav{width:42px;height:42px;border-radius:10px;flex:0 0 42px;background:#ece9fd;color:#5b4bd6;font-weight:800;display:flex;align-items:center;justify-content:center;font-size:15px}
  .prospect .pn{font-weight:800;font-size:14px}
  .prospect .role{font-size:12.5px;color:var(--muted)}
  .prospect .reason{font-size:12.3px;color:#444b59;margin-top:6px;line-height:1.5}
  .prospect .signals{margin-top:7px;display:flex;flex-wrap:wrap;gap:6px}
  .fit{margin-left:auto;text-align:center;flex:0 0 auto}
  .fit .ring{font-size:13px;font-weight:800;color:#fff;border-radius:20px;padding:3px 10px;background:var(--ok)}
  .fit .ring.mid{background:#caa206}
  .fit .lbl{font-size:10px;color:var(--muted);margin-top:3px}
  .xbtn{border:1px solid var(--line);background:#fff;width:28px;height:28px;border-radius:8px;cursor:pointer;color:#9098a6;font-size:14px;flex:0 0 28px;margin-left:6px}
  .xbtn:hover{background:#fdf1f0;color:#b42318;border-color:#f1c6c1}
  a.plink{color:var(--slack-blue);font-size:12px;text-decoration:none}

  .ptable{width:100%;border-collapse:collapse;font-size:12.8px}
  .ptable th{text-align:left;color:var(--muted);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.04em;padding:8px 10px;border-bottom:1px solid var(--line)}
  .ptable td{padding:10px;border-bottom:1px solid var(--line2);vertical-align:middle}
  .ptable tr:hover{background:#fafaff}
  .ftag{font-size:11px;font-weight:800;color:#fff;border-radius:14px;padding:2px 9px;background:var(--ok)}
  .ftag.mid{background:#caa206}

  /* duration / safety card */
  .infocard{border:1px solid #e2dcff;background:linear-gradient(180deg,#faf9ff,#f4f1ff);border-radius:12px;padding:15px 17px;margin:14px 0}
  .infocard h4{margin:0 0 4px;font-size:14px;color:#4a3bd0}
  .infocard p{margin:0;font-size:12.8px;color:#54506e;line-height:1.5}

  .wseq{border:1px solid var(--line);border-radius:11px;overflow:hidden}
  .wseq .row{display:flex;gap:14px;padding:14px 16px;border-bottom:1px solid var(--line2);align-items:center}
  .wseq .row:last-child{border-bottom:none}
  .wseq .num{width:28px;height:28px;border-radius:50%;background:#f0effe;color:#5b4bd6;font-weight:800;display:flex;align-items:center;justify-content:center;flex:0 0 28px;font-size:13px}
  .wseq .ti{font-weight:700;font-size:13.5px}
  .wseq .de{font-size:12.3px;color:var(--muted);margin-top:2px}
  .wseq .timing{margin-left:auto;font-size:12px;color:#5b4bd6;background:#f3f1ff;padding:4px 10px;border-radius:20px;font-weight:600;white-space:nowrap}

  /* popup overlay inside web frame */
  .overlay{position:absolute;inset:0;background:rgba(20,18,40,.45);backdrop-filter:blur(1px);padding:30px;display:flex;align-items:center;justify-content:center;z-index:5}
  .popup{background:#fff;border-radius:14px;box-shadow:0 24px 60px rgba(0,0,0,.3);width:100%;max-width:680px;overflow:hidden}
  .popup.wide{max-width:780px}
  .popup .ph{padding:16px 20px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:10px}
  .popup .ph h3{margin:0;font-size:16px}
  .popup .ph .x{margin-left:auto;color:var(--muted);cursor:pointer;font-size:18px}
  .popup .pb{padding:18px 20px;max-height:62vh;overflow-y:auto}
  .popup .pf{padding:14px 20px;border-top:1px solid var(--line);display:flex;gap:10px;justify-content:flex-end;background:#fbfbfd}

  .pill{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px}
  .pill.run{background:#e7f6ee;color:#1a7f53}
  .pill.paused{background:#fdf2e3;color:#b45309}
  .pill.attn{background:#fdecea;color:#b42318}
  .pill.draft{background:#f3f1ff;color:#6a5bd0}
  .pill.done{background:#eaeef5;color:#54607a}
  .camprow{transition:.15s}
  .camprow.click{cursor:pointer}
  .camprow.click:hover{border-color:var(--eve1);box-shadow:0 6px 18px rgba(109,94,252,.14)}
  .camprow .cmeta{display:flex;align-items:center;gap:12px}
  .camprow .cav{width:40px;height:40px;border-radius:11px;flex:0 0 40px;background:#ece9fd;display:flex;align-items:center;justify-content:center;font-size:18px}
  .ministat{font-size:12px;color:var(--muted)}
  .ministat b{display:block;font-size:18px;color:var(--ink);font-weight:800;margin-top:2px}
  .open-cue{font-size:12px;color:var(--eve1);font-weight:700;margin-left:auto}

  .legend{font-size:11px;color:var(--muted);margin-top:4px}
  .hint{font-size:11.5px;color:var(--eve1);background:#f3f1ff;border:1px dashed #cfc7fb;border-radius:8px;padding:7px 11px;margin-top:12px;display:inline-block}
  .progress{height:8px;border-radius:6px;background:#eceaf9;overflow:hidden;margin-top:6px}
  .progress i{display:block;height:100%;background:linear-gradient(90deg,var(--eve1),var(--eve2));border-radius:6px}
  .timeline{margin-top:6px}
  .timeline .t{display:flex;gap:10px;font-size:12.5px;padding:6px 0;align-items:center}
  .timeline .t .dot{width:9px;height:9px;border-radius:50%;background:var(--eve1);flex:0 0 9px}
  .timeline .t .dot.done{background:var(--ok)} .timeline .t .dot.next{background:#cbd0da}
  @media (max-width:1100px){.index{display:none}}
</style>
</head>
<body>
<div class="app">
  <!-- LEFT INDEX -->
  <aside class="index">
    <div class="brand">
      <div class="logo">e</div>
      <div><b>EVE</b><small>LinkedIn Outreach · Interactive Mockup</small></div>
    </div>
    <div class="idx-note">Click any step to jump to it. Buttons inside the mockups are live and advance the flow.</div>
    <div class="journey-h">End-to-end journey</div>
    <nav class="nav" id="nav"></nav>
  </aside>

  <!-- STAGE -->
  <main class="stage">
    <header class="topbar">
      <div>
        <h1 id="scr-title">—</h1>
        <div class="sub" id="scr-step">—</div>
      </div>
      <div class="surface-pill" id="surface-pill">
        <span data-s="slack">Slack</span><span data-s="web">Web app</span>
      </div>
      <div class="navbtns">
        <button id="prevBtn">‹ Prev</button>
        <button id="nextBtn">Next ›</button>
      </div>
    </header>
    <div class="canvas"><div class="screen-wrap">
      <div class="screen-caption" id="caption"></div>
      <div id="screen"></div>
    </div></div>
  </main>
</div>

<script>
/* ============================ Helpers ============================ */
const eveAv = '<div class="av eve">e</div>';
const userAv = '<div class="av user">O</div>';

function slack(channelLabel, bodyHtml, opts={}){
  const badge = opts.badge ? `<span class="badge">${opts.badge}</span>` : '';
  return `
  <div class="slack">
    <div class="slack-rail">
      <div class="ws">e</div>
      <div class="ic">🏠</div><div class="ic">✉️</div><div class="ic">⋯</div>
    </div>
    <div class="slack-side">

/* ============================ Render engine ============================ */
const nav=document.getElementById('nav');
const LI=new Set(['setup-1','copilot-proposal','copilot-style','copilot-prospects','copilot-list','copilot-plan','copilot-safety','copilot-messages','copilot-analytics','auto-2','auto-3','auto-web','auto-6']);
function shortLabel(t){return t.replace(/^Steps?[^—]*—\s*/,'').replace(/\s*\([^)]*\)\s*$/,'');}
let lastPhase='';
SCREENS.forEach((s,i)=>{
  if(s.phase!==lastPhase){const p=document.createElement('div');p.className='phase';p.textContent=s.phase;nav.appendChild(p);lastPhase=s.phase;}
  const a=document.createElement('a');a.dataset.id=s.id;
  a.innerHTML=`<span class="num">${i+1}</span><span class="lbl">${shortLabel(s.title)}</span>`;
  a.onclick=()=>go(s.id);
  nav.appendChild(a);
});

function render(){
  let id=location.hash.replace('#','')||SCREENS[0].id;
  let idx=SCREENS.findIndex(s=>s.id===id); if(idx<0){idx=0;id=SCREENS[0].id;}
  const s=SCREENS[idx];
  document.getElementById('scr-title').textContent=s.title;
  document.getElementById('scr-step').textContent=s.step;
  document.getElementById('caption').innerHTML=s.caption;
  document.getElementById('screen').innerHTML=s.render();
  document.querySelectorAll('#surface-pill span').forEach(el=>el.classList.toggle('on',el.dataset.s===s.surface));
  document.querySelectorAll('.nav a').forEach(a=>a.classList.toggle('active',a.dataset.id===s.id));
  const active=document.querySelector('.nav a.active'); if(active)active.scrollIntoView({block:'nearest'});
  const prev=document.getElementById('prevBtn'),next=document.getElementById('nextBtn');
  prev.disabled=idx===0; next.disabled=idx===SCREENS.length-1;
  prev.onclick=()=>go(SCREENS[Math.max(0,idx-1)].id);
  next.onclick=()=>go(SCREENS[Math.min(SCREENS.length-1,idx+1)].id);
  document.querySelector('.canvas').scrollTop=0;
}
window.addEventListener('hashchange',render);
render();
</script>
